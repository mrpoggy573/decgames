<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dec Games</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; width: 100%; max-width: 1000px; }
        .card { background: #fff; border-radius: 20px; padding: 30px; text-align: center; text-decoration: none; color: #333; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .icon { font-size: 3.5rem; }
    </style>
</head>
<body>
    <h1>Dec Games</h1>
    <div class="grid" id="game-grid"></div>
    <script>
        const games = [
            { name: "Pixel Art Maker", folder: "pixel-art", emoji: "🎨" },
            { name: "Space Game",      folder: "space-game", emoji: "🚀" },
            { name: "Snail Simulator", folder: "game-1",      emoji: "🐌" },
            { name: "FNAF 2026",       folder: "fnaf",       emoji: "🐻" },
            { name: "Guess Who",       folder: "game-2",     emoji: "🔍" },
            { name: "Numble",          folder: "game-3",     emoji:  "1️⃣"},
            { name: "Pong",            folder: "game-4",     emoji:  "🕹️"}
        ];
        const grid = document.getElementById('game-grid');
        games.forEach(game => {
            const card = document.createElement('a');
            card.href = `${game.folder}/index.html`;
            card.className = 'card';
            card.innerHTML = `<div class="icon">${game.emoji}</div><span>${game.name}</span>`;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
