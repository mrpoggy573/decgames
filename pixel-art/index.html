<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Collection</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; width: 100%; max-width: 1000px; }
        .card { background: #fff; border-radius: 20px; padding: 40px; text-align: center; text-decoration: none; color: #333; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s ease; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .icon { font-size: 3rem; }
    </style>
</head>
<body>
    <h1>My Games</h1>
    <div class="grid">
        <a href="pixel-art/index.html" class="card"><div class="icon">🎨</div><span>Pixel Art Maker</span></a>
        <a href="space-game/index.html" class="card"><div class="icon">🚀</div><span>Space Game</span></a>
    </div>
</body>
</html>
